name: Publish to npm

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm typecheck

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          # No registry-url — let npm handle OIDC auth natively
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Upgrade npm to latest for full OIDC trusted publishing support
      - run: npm install -g npm@latest
      # OIDC Trusted Publishing — npm authenticates via GitHub Actions
      # OIDC automatically. No NODE_AUTH_TOKEN needed.
      - run: npm publish --access public --provenance
