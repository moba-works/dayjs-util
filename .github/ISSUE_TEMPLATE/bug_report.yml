name: Bug Report
description: Report a bug in @brandonwie/dayjs-util
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below so we can reproduce and fix the issue.

  - type: input
    id: dayjs-util-version
    attributes:
      label: dayjs-util version
      placeholder: "0.4.0"
    validations:
      required: true

  - type: input
    id: dayjs-version
    attributes:
      label: dayjs version
      placeholder: "1.11.13"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "24.x"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Node.js
        - Browser
        - Both
    validations:
      required: true

  - type: input
    id: timezone
    attributes:
      label: Timezone context
      description: >
        The IANA timezone(s) involved (e.g., America/New_York, Asia/Seoul).
        For timezone-related bugs, include all timezones relevant to reproduction.
      placeholder: "Asia/Seoul (UTC+9)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code to reproduce the issue.
      render: ts
      value: |
        import { DayjsUtil } from "@brandonwie/dayjs-util";

        // Your reproduction code here
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include any error messages or incorrect output.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: >
        Any other context about the problem — screenshots, logs, DST-related info,
        or whether the issue occurs at specific times of year (DST transitions).
    validations:
      required: false
