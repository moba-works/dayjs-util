repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: dayjs-util-typecheck
        name: dayjs-util typecheck
        entry: corepack pnpm run typecheck
        language: system
        pass_filenames: false
        files: \.(ts|tsx)$
      - id: dayjs-util-test
        name: dayjs-util test
        entry: corepack pnpm run test
        language: system
        pass_filenames: false
        files: \.(ts|tsx)$
